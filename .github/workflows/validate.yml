name: Validate Homelab Configs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-compose:
    name: Validate Docker Compose files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate all compose files
        run: |
          for f in $(find . -name 'compose.yaml' | sort); do
            echo "Validating $f"
            docker compose -f "$f" config -q && echo "OK" || echo "FAILED"
          done

  validate-yaml:
    name: Lint YAML files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint Ansible playbook
        run: yamllint -d relaxed ansible/ || true

      - name: Lint monitoring configs
        run: yamllint -d relaxed monitoring/ || true
